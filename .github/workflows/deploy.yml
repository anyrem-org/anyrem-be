# https://docs.github.com/en/actions/tutorials/create-an-example-workflow
name: CI/CD Deploy Docker
run-name: ${{ github.actor }} is deploying to ${{ github.ref }}
on:
  push:
    branches:
      - main

env:
  CONTAINER_NAME: anyrem-be
  ENV_FILE: /opt/anyrem-be/.env.production
  UPLOADS_VOLUME: anyrem_uploads
  DOCKER_NETWORK: anyrem_network

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/anyrem-be
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            IMAGE_NAME=${{ env.IMAGE_NAME }}
            CONTAINER_NAME=${{ env.CONTAINER_NAME }}
            DOCKER_NETWORK=${{ env.DOCKER_NETWORK }}
            ENV_FILE=${{ env.ENV_FILE }}
            UPLOADS_VOLUME=${{ env.UPLOADS_VOLUME }}

            docker pull "$IMAGE_NAME:latest"

            docker network inspect "$DOCKER_NETWORK" > /dev/null 2>&1 || docker network create "$DOCKER_NETWORK"

            docker run --rm \
              --add-host=host.docker.internal:172.18.0.1 \
              --network "$DOCKER_NETWORK" \
              --env-file "$ENV_FILE" \
              "$IMAGE_NAME:latest" \
              pnpm exec prisma migrate deploy

            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --add-host=host.docker.internal:172.18.0.1 \
              --network "$DOCKER_NETWORK" \
              --restart unless-stopped \
              -p 127.0.0.1:3005:3000 \
              --env-file "$ENV_FILE" \
              -v "$UPLOADS_VOLUME":/app/uploads \
              "$IMAGE_NAME:latest"

            docker image prune -f

      - name: Notify telegram success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_APP_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          --data-urlencode text="Hey ${{ github.actor }}, mới build API backend thành công rồi đó, vô check nha 😁
          ✅ <b>Deploy Success</b>

          🌿 Branch:
          ${{ github.ref_name }}

          📝 Commit:
          <code>${{ github.event.head_commit.message }}</code>

          👤 Author:
          ${{ github.event.head_commit.author.name }}

      - name: Notify telegram fail
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_APP_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          --data-urlencode text="Hey ${{ github.actor }}, hệ thống API backend build chưa được, vô check thử nha kk 😅
          ❌ <b>Deploy Failed</b>

          🌿 Branch:
          ${{ github.ref_name }}

          📝 Commit:
          <code>${{ github.event.head_commit.message }}</code>

          👤 Author:
          ${{ github.event.head_commit.author.name }}
